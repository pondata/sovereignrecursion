<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Sovereign Recursion</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23f5efe2'/%3E%3Cpath d='M16 7 L23 16 L16 25 L9 16 Z' fill='none' stroke='%231a1410' stroke-width='1.5'/%3E%3Ccircle cx='16' cy='16' r='2' fill='%238b3a1c'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --paper: #f5efe2;
      --paper-edge: #ebe2d0;
      --ink: #1a1410;
      --ink-soft: #6e6557;
      --rule: #c8bea7;
      --madder: #8b3a1c;
    }
    html { background: var(--paper-edge); height: 100%; }
    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'Cormorant Garamond', Georgia, serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
      text-align: center;
    }
    .sigil {
      width: 30px;
      height: 30px;
      transform: rotate(45deg);
      border: 1.5px solid var(--madder);
      margin-bottom: 3rem;
      opacity: 0.6;
    }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 400;
      font-size: 2.2rem;
      color: var(--ink);
      margin-bottom: 1rem;
      letter-spacing: -0.005em;
    }
    p {
      font-size: 1.15rem;
      color: var(--ink-soft);
      max-width: 28rem;
      line-height: 1.6;
      margin-bottom: 3rem;
    }
    p em { color: var(--ink); font-style: italic; }
    nav {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    nav a {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-soft);
      text-decoration: none;
      border-bottom: 1px solid var(--rule);
      padding-bottom: 2px;
    }
    nav a:hover { color: var(--madder); border-bottom-color: var(--madder); }
  </style>
</head>
<body>
  <div class="sigil"></div>
  <h1>This page is out of jurisdiction.</h1>
  <p>The route you tried to reach does not exist, or no longer does. <em>The principle persists; the rest is provisional.</em></p>
  <nav>
    <a href="/">The principle</a>
    <a href="/essays/">Essays</a>
    <a href="/architecture/">Architecture</a>
    <a href="mailto:justin@sovereignrecursion.com">Correspond</a>
  </nav>
</body>
</html>
